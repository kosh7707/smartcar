rules:
  # ─── Taint mode: 외부 입력 → division/modulo sink ───
  # cross-block 데이터 플로우를 자동 추적 (Juliet 중첩 블록 대응)

  - id: aegis.c.cwe-369-taint-divide-by-zero
    mode: taint
    pattern-sources:
      - pattern: atoi(...)
      - pattern: atof(...)
      - pattern: strtol(...)
      - pattern: strtod(...)
      - pattern: strtof(...)
      - pattern: RAND32()
      - pattern: rand()
    pattern-sinks:
      - patterns:
          - pattern: $X / $SINK
          - focus-metavariable: $SINK
      - patterns:
          - pattern: $X % $SINK
          - focus-metavariable: $SINK
    pattern-sanitizers:
      - patterns:
          - pattern-inside: |
              if ($SINK != 0) { ... }
          - focus-metavariable: $SINK
      - patterns:
          - pattern-inside: |
              if (0 != $SINK) { ... }
          - focus-metavariable: $SINK
      - patterns:
          - pattern-inside: |
              if ($SINK > 0) { ... }
          - focus-metavariable: $SINK
      - patterns:
          - pattern-inside: |
              if ($SINK < 0) { ... }
          - focus-metavariable: $SINK
      - patterns:
          - pattern-inside: |
              if ($SINK >= 1) { ... }
          - focus-metavariable: $SINK
    message: >
      Potential divide/modulo by zero: external input ($SINK) used as divisor
      without zero check. atoi/atof/rand can return 0.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: HIGH
      impact: MEDIUM
      automotive_rationale: >
        Division by zero in real-time control loops (engine management, brake
        control, steering assist) causes undefined behavior that can lead to
        ECU reset or uncontrolled actuator states.
      references:
        - "ISO 26262-6:2018 Table 1 (1d) — No unintended functionality"
        - "MISRA C:2012 Rule 1.3 — No undefined or critical unspecified behavior"

  # ─── fscanf/scanf: 포인터 전달 패턴 (taint가 &$X 추적 불가) ───
  # function-level pattern-inside로 cross-block 매칭

  - id: aegis.c.cwe-369-fscanf-then-divide
    patterns:
      - pattern-either:
          - pattern: $X / $Y
          - pattern: $X % $Y
      - pattern-inside: |
          $RET $FUNC(...) {
            ...
            fscanf(..., ..., &$Y);
            ...
          }
    message: >
      Potential divide/modulo by zero: fscanf() input used as divisor.
      fscanf reads user/file input that may be zero.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: MEDIUM
      impact: MEDIUM
      automotive_rationale: >
        File-sourced configuration values parsed via fscanf must be validated
        before use in arithmetic operations.
      references:
        - "ISO 26262-6:2018 Table 1 (1d)"
        - "MISRA C:2012 Dir 4.14"

  - id: aegis.c.cwe-369-scanf-then-divide
    patterns:
      - pattern-either:
          - pattern: $X / $Y
          - pattern: $X % $Y
      - pattern-inside: |
          $RET $FUNC(...) {
            ...
            scanf(..., &$Y);
            ...
          }
    message: >
      Potential divide/modulo by zero: scanf() input used as divisor.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: MEDIUM
      impact: MEDIUM
      automotive_rationale: >
        scanf-sourced values from diagnostic ports can contain zero values.
      references:
        - "ISO 26262-6:2018 Table 1 (1d)"
        - "MISRA C:2012 Dir 4.14"

  # ─── 직접 expression 패턴 (어디서든 매칭, taint 보완) ───

  - id: aegis.c.cwe-369-atoi-as-divisor
    patterns:
      - pattern-either:
          - pattern: $X / atoi(...)
          - pattern: $X % atoi(...)
    message: >
      Potential divide by zero: atoi() result used directly as divisor.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: HIGH
      impact: MEDIUM
      references:
        - "ISO 26262-6:2018 Table 1 (1d)"
        - "MISRA C:2012 Rule 1.3"

  - id: aegis.c.cwe-369-atof-as-divisor
    patterns:
      - pattern-either:
          - pattern: $X / atof(...)
          - pattern: $X % atof(...)
    message: >
      Potential divide by zero: atof() returns 0.0 on invalid input.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: HIGH
      impact: MEDIUM
      automotive_rationale: >
        Float division by zero produces INF/NAN in IEEE 754, which propagates
        silently through PID control calculations.
      references:
        - "ISO 26262-6:2018 Table 1 (1d)"

  - id: aegis.c.cwe-369-strtol-as-divisor
    patterns:
      - pattern-either:
          - pattern: $X / strtol(...)
          - pattern: $X % strtol(...)
    message: >
      Potential divide by zero: strtol() returns 0 on invalid input.
    languages: [c]
    severity: WARNING
    metadata:
      cwe: ["CWE-369"]
      category: security
      confidence: HIGH
      impact: MEDIUM
      references:
        - "ISO 26262-6:2018 Table 1 (1d)"
        - "MISRA C:2012 Rule 1.3"
