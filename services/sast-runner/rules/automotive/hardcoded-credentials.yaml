rules:
  - id: aegis.c.cwe-798-hardcoded-password-assignment
    patterns:
      - pattern: |
          $TYPE $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apikey|token|credential|auth_key|private_key)
    message: >
      Hardcoded credential: variable '$VAR' appears to contain a hardcoded password or secret.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798"
      category: security
      confidence: HIGH
      impact: HIGH

  - id: aegis.c.cwe-798-hardcoded-password-define
    pattern: |
      #define $NAME "..."
    metavariable-regex:
      metavariable: $NAME
      regex: (?i)(PASSWORD|PASSWD|SECRET|API_KEY|APIKEY|TOKEN|CREDENTIAL|AUTH_KEY|PRIVATE_KEY|DEFAULT_PASS)
    message: >
      Hardcoded credential in #define: '$NAME' contains a hardcoded secret.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798"
      category: security
      confidence: HIGH
      impact: HIGH
