rules:
  - id: aegis.c.cwe-798-hardcoded-password-assignment
    patterns:
      - pattern: |
          $TYPE $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apikey|token|credential|auth_key|private_key)
    message: >
      Hardcoded credential: variable '$VAR' appears to contain a hardcoded password or secret.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798"
      category: security
      confidence: HIGH
      impact: HIGH
      automotive_rationale: >
        Hardcoded credentials in automotive firmware compromise OTA update
        authentication, telematics backend access, and diagnostic port
        security. Extracted credentials from one ECU can be used to attack
        all vehicles using the same firmware. UNECE R155 mandates secure
        credential management for connected vehicles.
      references:
        - "UNECE WP.29 R155 — Cybersecurity requirements for vehicles"
        - "ISO/SAE 21434:2021 — Road vehicles cybersecurity engineering"
        - "AUTOSAR SecOC — Secure key storage requirements"

  - id: aegis.c.cwe-798-hardcoded-password-define
    pattern: |
      #define $NAME "..."
    metavariable-regex:
      metavariable: $NAME
      regex: (?i)(PASSWORD|PASSWD|SECRET|API_KEY|APIKEY|TOKEN|CREDENTIAL|AUTH_KEY|PRIVATE_KEY|DEFAULT_PASS)
    message: >
      Hardcoded credential in #define: '$NAME' contains a hardcoded secret.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798"
      category: security
      confidence: HIGH
      impact: HIGH
      automotive_rationale: >
        Preprocessor-defined secrets are compiled into firmware binaries and
        easily extractable via reverse engineering. This is especially critical
        in automotive systems where firmware images may be obtained through
        OTA update interception or physical ECU access.
      references:
        - "UNECE WP.29 R155"
        - "ISO/SAE 21434:2021"
        - "AUTOSAR SecOC"
