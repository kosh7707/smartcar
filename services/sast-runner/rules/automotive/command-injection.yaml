rules:
  - id: aegis.c.cwe-78-system-with-variable
    patterns:
      - pattern: system($ARG)
      - pattern-not: system("...")
    message: >
      Potential OS command injection: system() called with non-literal argument.
      If $ARG contains user-controlled input, an attacker can execute arbitrary commands.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78"
      category: security
      confidence: HIGH
      impact: HIGH
      automotive_rationale: >
        Command injection on an automotive ECU can enable arbitrary code execution
        on safety-critical control units, potentially compromising braking, steering,
        or powertrain functions. ISO 26262-6 Table 1 (1b) requires prevention of
        unintended software execution paths in safety-related systems.
      references:
        - "ISO 26262-6:2018 Table 1 (1b) — Prevention of unintended execution"
        - "MISRA C:2012 Dir 4.14 — Controlling data from external sources"
        - "AUTOSAR C++14 M18-0-3 — Library function usage restrictions"

  - id: aegis.c.cwe-78-popen-with-variable
    patterns:
      - pattern: popen($ARG, ...)
      - pattern-not: popen("...", ...)
    message: >
      Potential OS command injection: popen() called with non-literal argument.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78"
      category: security
      confidence: HIGH
      impact: HIGH
      automotive_rationale: >
        popen() with attacker-controlled arguments can execute arbitrary shell
        commands on ECU Linux systems, bypassing access control and potentially
        affecting vehicle network communication or diagnostic interfaces.
      references:
        - "ISO 26262-6:2018 Table 1 (1b)"
        - "MISRA C:2012 Dir 4.14"

  - id: aegis.c.cwe-78-execl-with-variable
    patterns:
      - pattern: execl($PATH, ...)
      - pattern-not: execl("...", ...)
    message: >
      Potential OS command injection: execl() called with non-literal path.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78"
      category: security
      confidence: MEDIUM
      impact: HIGH
      automotive_rationale: >
        exec-family functions with variable paths allow process replacement attacks.
        In automotive ECUs, this can be exploited via OTA update channels or
        diagnostic ports to gain persistent control of the target system.
      references:
        - "ISO 26262-6:2018 Table 1 (1b)"
        - "MISRA C:2012 Rule 21.5 — signal.h functions"

  - id: aegis.c.cwe-78-execlp-with-variable
    patterns:
      - pattern: execlp($CMD, ...)
      - pattern-not: execlp("...", ...)
    message: >
      Potential OS command injection: execlp() called with non-literal command.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78"
      category: security
      confidence: MEDIUM
      impact: HIGH
      automotive_rationale: >
        PATH-based command resolution (execlp) is especially dangerous in
        embedded Linux systems where PATH manipulation can redirect execution
        to attacker-controlled binaries.
      references:
        - "ISO 26262-6:2018 Table 1 (1b)"
        - "MISRA C:2012 Dir 4.14"

  - id: aegis.c.cwe-78-execvp-with-variable
    patterns:
      - pattern: execvp($CMD, ...)
      - pattern-not: execvp("...", ...)
    message: >
      Potential OS command injection: execvp() called with non-literal command.
    languages: [c]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78"
      category: security
      confidence: MEDIUM
      impact: HIGH
      automotive_rationale: >
        execvp with variable command names enables process replacement attacks
        through PATH manipulation on embedded Linux-based ECUs.
      references:
        - "ISO 26262-6:2018 Table 1 (1b)"
        - "MISRA C:2012 Dir 4.14"
